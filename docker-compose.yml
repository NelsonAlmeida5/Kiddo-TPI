services:
  mysql:
    image: mysql:8.0
    container_name: kiddo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_kiddo
      MYSQL_USER: kiddo_user
      MYSQL_PASSWORD: kiddo_password
    ports:
      - "3306:3306"
    volumes:
      - kiddo_mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: kiddo_phpmyadmin
    restart: unless-stopped
    depends_on:
      - mysql
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8080:80"

volumes:
  kiddo_mysql_data:
